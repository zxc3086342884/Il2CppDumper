name: Build
on:
  workflow_dispatch:
      inputs:
        package_name:
          description: "Package name of the game (leave empty for universal build):"
          required: false
          default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 11
        cache: gradle

    - name: Replace package name (if specified)
      if: ${{ github.event.inputs.package_name != '' }}
      run: |
        sed -i 's/moduleDescription = "/moduleDescription = "(${{ github.event.inputs.package_name }}) /g' module.gradle
        sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew :module:assembleRelease

    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/
